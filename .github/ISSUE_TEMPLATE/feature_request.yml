name: Feature request
description: Suggest an improvement for File Browser Desktop.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security considerations
      description: Note whether this affects SSH, credentials, server setup, or public exposure.
